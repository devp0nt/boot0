name: Feature request
description: Suggest a new feature or enhancement
labels: ['enhancement', 'triage']
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem are you trying to solve? Why is the current behavior insufficient?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the API or behavior you'd like to see. Code samples welcome.
      render: ts
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: What other approaches have you tried or thought about?
  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Anything else that might help us evaluate this request.
